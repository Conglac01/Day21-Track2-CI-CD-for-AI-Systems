name: MLOps Pipeline

on:
  push:
    branches: [master]
    paths:
      - 'data/**.dvc'
      - 'src/**.py'
      - 'params.yaml'
      - 'requirements.txt'
      - '.github/workflows/mlops.yml'
  workflow_dispatch:

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: us-east-1
  AWS_EC2_METADATA_DISABLED: true

jobs:

  # =========================================================================
  # JOB 1 - UNIT TEST
  # =========================================================================
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest==8.2.0 scikit-learn==1.4.2 pandas==2.2.2 joblib==1.4.2 pyyaml==6.0.1

      - name: Run unit tests
        run: pytest tests/ -v


  # =========================================================================
  # JOB 2 - TRAIN
  # =========================================================================
  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scikit-learn==1.4.2 pandas==2.2.2 joblib==1.4.2 pyyaml==6.0.1 boto3==1.34.0

      - name: Pull DVC data from S3
        run: |
          python -c "
          import os
          import yaml
          import boto3

          s3 = boto3.client('s3', region_name='us-east-1')
          bucket = '${{ secrets.CLOUD_BUCKET }}'
          remote_prefix = 'dvc/files/md5'

          for dvc_file in ['data/train_phase1.csv.dvc', 'data/eval.csv.dvc']:
              with open(dvc_file) as f:
                  meta = yaml.safe_load(f)
              out = meta['outs'][0]
              md5 = out['md5']
              key = f'{remote_prefix}/{md5[:2]}/{md5[2:]}'
              local_path = os.path.join(os.path.dirname(dvc_file), out['path'])
              os.makedirs(os.path.dirname(local_path), exist_ok=True)
              s3.download_file(bucket, key, local_path)
              print(f'Downloaded {key} -> {local_path}')
          "

      - name: Train model
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        run: |
          ACC=$(python -c "import json; d=json.load(open('outputs/metrics.json')); print(d['accuracy'])")
          echo "accuracy=$ACC" >> $GITHUB_OUTPUT
          echo "Accuracy: $ACC"

      - name: Upload model to S3
        run: |
          python -c "
          import boto3, os
          s3 = boto3.client('s3', region_name='us-east-1')
          bucket = '${{ secrets.CLOUD_BUCKET }}'
          s3.upload_file('models/model.pkl', bucket, 'models/latest/model.pkl')
          print('Model uploaded to S3')
          "

      - name: Save metrics artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: outputs/metrics.json


  # =========================================================================
  # JOB 3 - EVAL
  # =========================================================================
  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:
      - name: Check eval gate
        run: |
          python3 -c "
          acc = float('${{ needs.train.outputs.accuracy }}')
          threshold = 0.70
          if acc < threshold:
            raise SystemExit(f'FAILED: accuracy {acc:.4f} < {threshold}. Cancel deploy.')
          print(f'PASSED: accuracy {acc:.4f} >= {threshold}. Proceeding to deploy.')
          "


  # =========================================================================
  # JOB 4 - DEPLOY
  # =========================================================================
  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy and health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            sudo systemctl restart mlops-serve
            sleep 5
            for i in 1 2 3 4 5; do
              echo "Health check $i/5..."
              curl -sf http://localhost:8000/health && echo "OK" && exit 0
              sleep 3
            done
            echo "Health check failed"
            exit 1
