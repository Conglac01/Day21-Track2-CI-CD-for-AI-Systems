name: MLOps Pipeline

on:
  push:
    branches: [master]
    paths:
      - 'src/**.py'
      - 'params.yaml'
      - 'requirements.txt'
      - '.github/workflows/mlops.yml'
  workflow_dispatch:

jobs:
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest==8.2.0 scikit-learn==1.4.2 pandas==2.2.2 joblib==1.4.2 pyyaml==6.0.1

      - name: Run unit tests
        run: pytest tests/ -v
